<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ReMate | 로그인</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f8fafc; }
        .container { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 350px; text-align: center; }
        h2 { margin-bottom: 25px; font-size: 1.5rem; color: #1e293b; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 1rem; transition: 0.2s; }
        input:focus { outline: 2px solid #3b82f6; border-color: transparent; }
        .btn-login { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1rem; transition: 0.2s; }
        .btn-login:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-login:hover:not(:disabled) { background: #2563eb; }
        .link-group { margin-top: 24px; font-size: 0.85rem; color: #64748b; }
        .link-group a { color: #3b82f6; text-decoration: none; font-weight: 600; margin: 0 5px; }
        .error-msg { color: #ef4444; font-size: 0.8rem; margin-top: 10px; display: none; text-align: left; padding-left: 5px; min-height: 1.2em; line-height: 1.4; }
    </style>
</head>
<body>
<div class="container">
    <div style="font-size: 1.8rem; font-weight: 800; color: #3b82f6; margin-bottom: 10px; cursor: pointer;" onclick="location.href='/'">✅ Re:Mate</div>
    <h2>로그인</h2>
    <input type="email" id="email" placeholder="이메일" autocomplete="email">
    <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password">
    <div id="error-display" class="error-msg"></div>
    <button onclick="handleLogin()" id="login-btn" class="btn-login">로그인</button>
    <div class="link-group">
        <a href="/signup.html">회원가입</a> | <a href="/">홈으로</a>
    </div>
</div>
<script>
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        const errorDisplay = document.getElementById('error-display');
        errorDisplay.style.display = 'none';
        if (!email || !password) return showError("이메일과 비밀번호를 입력해주세요.");
        try {
            btn.disabled = true;
            btn.innerText = "인증 중...";
            const response = await fetch('/api/v1/auth/signin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const result = await response.json();
            if (response.ok) {
                const data = result.data || result;
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('userEmail', data.email);
                localStorage.setItem('userName', data.name);
                localStorage.setItem('userId', data.userId);
                location.href = "/workspace-list.html";
            } else {
                let msg = result.message || result.error?.message || "로그인 정보를 확인해주세요.";
                showError(msg);
            }
        } catch (e) {
            showError("서버와 통신할 수 없습니다.");
        } finally {
            btn.disabled = false;
            btn.innerText = "로그인";
        }
    }
    function showError(msg) {
        const errorDisplay = document.getElementById('error-display');
        errorDisplay.innerText = msg;
        errorDisplay.style.display = 'block';
    }
    document.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>

spring.application.name=backend
server.port=8080
server.forward-headers-strategy=framework

# --- Swagger ---
spring.config.import=optional:classpath:application-secret.properties

spring.datasource.url=jdbc:mariadb://localhost:3306/receipt?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Google ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# --- Kakao ---
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,profile_image,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao

# --- Kakao Provider ---
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
server.tomcat.max-swallow-size=-1

app.storage.root-dir=storage
app.storage.max-bytes=5242880
app.storage.allowed-content-types=image/jpeg,image/png,image/webp

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}
app.jwt.secret=${APP_JWT_SECRET:remate-dev-secret-key-remate-dev-secret-key}

# --- Public Data DayInfo ---
public.data.api.key=${PUBLIC_DATA_API_KEY}

# --- Excel Download Receipt URL ---
app.backend.base-url=${BACKEND_BASE_URL:http://localhost:8080}
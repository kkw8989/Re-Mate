server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:remate_dev;MODE=MariaDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB

app.storage.root-dir=storage
app.storage.max-bytes=5242880
app.storage.allowed-content-types=image/jpeg,image/png,image/webp

spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test

spring.security.oauth2.client.registration.kakao.client-id=test
spring.security.oauth2.client.registration.kakao.client-secret=test

google.vision.api-key=test
google.api.key=test

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}
app.jwt.secret=${APP_JWT_SECRET:remate-dev-secret-key-remate-dev-secret-key}